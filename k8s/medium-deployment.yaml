apiVersion: apps/v1
kind: Deployment
metadata:
  name: medium-model
  labels:
    app: medium-model
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medium-model
  template:
    metadata:
      labels:
        app: medium-model
    spec:
      containers:
        - name: medium-model
          image: ml-gateway/medium:latest
          ports:
            - containerPort: 8002
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
